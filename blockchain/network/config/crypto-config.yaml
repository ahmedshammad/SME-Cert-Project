# Hyperledger Fabric Crypto Configuration
# Defines the organizational structure and certificate generation parameters
# for the SME Certificate Trust Platform network

OrdererOrgs:
  - Name: Orderer
    Domain: example.com
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer
        SANS:
          - localhost
          - 127.0.0.1
          - orderer.example.com
      - Hostname: orderer2
        SANS:
          - localhost
          - 127.0.0.1
          - orderer2.example.com
      - Hostname: orderer3
        SANS:
          - localhost
          - 127.0.0.1
          - orderer3.example.com

PeerOrgs:
